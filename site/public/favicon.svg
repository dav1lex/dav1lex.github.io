  <rect x="2" y="4" width="28" height="26" rx="1" fill="#5a7a3a"/>
  <!-- metal slider -->
  <rect x="2" y="1" width="20" height="6" rx="1" fill="#8ab84a"/>
  <!-- top cutout -->
  <rect x="25" y="4" width="5" height="12" rx="0.5" fill="#0d0d0d"/>
  <!-- label -->
